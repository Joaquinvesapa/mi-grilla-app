# ── GitHub Pages — static demo deployment ────────────────────
# Builds the Next.js app in static export mode (demo only)
# and deploys to GitHub Pages on every push to main.
#
# Strategy: temporarily remove server-only PAGE files (page.tsx,
# layout.tsx, route.ts, actions.ts) from non-demo routes so
# Next.js static export only processes the demo subtree.
# We keep _components/ directories because demo imports shared
# client components from app/(app)/_components/.

name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Remove server-only routes for static export
        run: |
          # Remove route files from server-only directories
          # (keeps _components/ intact for shared imports)
          for dir in "app/(app)" "app/auth" "app/login" "app/onboarding" "app/admin" "app/~offline"; do
            if [ -d "$dir" ]; then
              find "$dir" -maxdepth 10 \( -name "page.tsx" -o -name "layout.tsx" -o -name "route.ts" \) -delete
            fi
          done
          # Remove middleware (not supported in static export)
          rm -f middleware.ts
          # Remove service worker source (Serwist, not needed)
          rm -f app/sw.ts

      - name: Build static export
        run: pnpm build
        env:
          GITHUB_PAGES: "1"
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"
          NEXT_PUBLIC_SITE_URL: "https://joaquinvesapa.github.io/mi-grilla-app"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
